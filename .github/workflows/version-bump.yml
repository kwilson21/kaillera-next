name: Version Bump

on:
  push:
    branches: [main]

jobs:
  bump:
    # Only run on feat: or fix: commits, skip version bump commits
    if: |
      startsWith(github.event.head_commit.message, 'feat:') ||
      startsWith(github.event.head_commit.message, 'feat(') ||
      startsWith(github.event.head_commit.message, 'fix:') ||
      startsWith(github.event.head_commit.message, 'fix(')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run version bump
        # `just deploy` invokes the script with no args (range = origin/main..HEAD).
        # Here, post-squash-merge, origin/main == HEAD, so we pass --from with
        # the pre-push SHA (github.event.before) so the script's RANGE covers
        # exactly the commits the merge introduced. Everything else — bump
        # rule, changelog, commit, tag — is identical to local `just deploy`.
        run: bash scripts/bump-version.sh --from "${{ github.event.before }}"

      - name: Push version bump
        run: git push --follow-tags
