repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix, --config, server/pyproject.toml]
        files: ^server/
      - id: ruff-format
        args: [--config, server/pyproject.toml]
        files: ^server/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, css, json, yaml, html]
        exclude: ^(build/src/|web/static/ejs/|node_modules/)

# Note: version bumping moved out of the post-commit hook. Run `just deploy`
# to bump version + tag + push as a single explicit operation. See
# scripts/bump-version.sh for the bump logic.
