services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-changeme}', '--no-auth-warning', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  kaillera-next:
    image: ghcr.io/kwilson21/kaillera-next:${APP_VERSION:-latest}
    depends_on:
      - redis
    environment:
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - ICE_SERVERS=${ICE_SERVERS}
      - PORT=${PORT}
      - MAX_ROOMS=${MAX_ROOMS}
      - MAX_SPECTATORS=${MAX_SPECTATORS}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS}
      - ADMIN_KEY=${ADMIN_KEY}
      - DEBUG_MODE=${DEBUG_MODE}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - DB_PATH=${DB_PATH:-/app/server/data/kn.db}
      - IP_HASH_SALT=${IP_HASH_SALT}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://us.i.posthog.com}
    ports:
      - '27888:27888'
    volumes:
      - kaillera-logs:/app/server/logs
      - kaillera-data:/app/server/data
    stop_grace_period: 30s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import os,urllib.request;urllib.request.urlopen('http://localhost:'+os.environ.get('PORT','27888')+'/health')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  kaillera-logs:
  kaillera-data:
  redis-data:
