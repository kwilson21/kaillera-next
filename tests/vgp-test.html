<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VGP Test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        color: #eee;
        font-family: sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow: hidden;
      }
      #game {
        width: 100vw;
        max-width: 100vw;
        flex: 1 1 0;
        min-height: 0;
        margin: auto 0;
        order: 1;
        position: relative;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game .game-content {
        height: 100%;
        aspect-ratio: 4/3;
        max-width: 100%;
        background: linear-gradient(135deg, #1a2a1a 25%, #1a3a1a 50%, #1a2a1a 75%);
        border: 2px solid rgba(100, 255, 100, 0.4);
      }
      #toolbar {
        width: 100%;
        flex-shrink: 0;
        order: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px 12px;
        background: rgba(17, 17, 17, 0.95);
        z-index: 50;
        align-items: center;
      }
      #toolbar span {
        font-size: 12px;
        color: #888;
      }
      #toolbar .status {
        color: #6af;
        margin-left: 8px;
      }
      .toolbar-spacer {
        flex: 1;
      }
      #toolbar button {
        padding: 6px 12px;
        font-size: 12px;
        min-height: 36px;
        border: none;
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
      }
      .toolbar-toggle {
        background: #333;
        font-size: 11px !important;
        padding: 4px 10px !important;
        min-height: 28px !important;
      }
      #toolbar-leave {
        background: #8a3a3a;
      }
      #device-label {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #6af;
        font-size: 11px;
        padding: 2px 10px;
        border-radius: 0 0 6px 6px;
        z-index: 9999;
        white-space: nowrap;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="device-label"></div>
    <div id="game"><div class="game-content"></div></div>
    <div id="toolbar">
      <span>Room: TEST1234</span><span class="status">Connected -- game on!</span>
      <div class="toolbar-spacer"></div>
      <button class="toolbar-toggle">Share</button><button class="toolbar-toggle">Info</button
      ><button class="toolbar-toggle">Remap</button><button id="toolbar-leave">Leave Game</button>
    </div>
    <script>
      window.KNState = { touchInput: {} };
      for (let i = 0; i < 24; i++) window.KNState.touchInput[i] = 0;
    </script>
    <script src="/static/virtual-gamepad.js"></script>
    <script>
      VirtualGamepad.init();
    </script>
  </body>
</html>
