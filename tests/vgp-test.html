<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VGP Test</title>
    <!-- Use the real play.css so body/game/toolbar/info-overlay styles match production exactly
         (including 100dvh, #info-overlay in-flow on mobile, #gamepad-indicator, etc.) -->
    <link rel="stylesheet" href="/static/play.css" />
    <style>
      /* Mock game canvas */
      #game .game-content {
        height: 100%;
        aspect-ratio: 4/3;
        max-width: 100%;
        margin: 0 auto;
        background: linear-gradient(135deg, #1a2a1a 25%, #1a3a1a 50%, #1a2a1a 75%);
        border: 2px solid rgba(100, 255, 100, 0.4);
      }
      /* Device label injected by the test runner */
      #device-label {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #6af;
        font-size: 11px;
        padding: 2px 10px;
        border-radius: 0 0 6px 6px;
        z-index: 9999;
        white-space: nowrap;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div id="device-label"></div>
    <div id="game"><div class="game-content"></div></div>

    <!-- Matches production in-flow elements (order 8 + 9 on mobile) -->
    <div id="info-overlay">
      <span id="info-header">Room TEST1234</span>
      <span id="info-stats">f=1234 delay=4f ping=32ms</span>
    </div>
    <div id="gamepad-indicator" class="hidden">Gamepad connected</div>

    <div id="toolbar">
      <span id="toolbar-room">TEST1234</span>
      <span id="toolbar-status"></span>
      <div class="toolbar-spacer"></div>
      <div id="share-wrapper">
        <button id="toolbar-share" class="toolbar-toggle" title="Share invite link">Share</button>
        <div id="share-dropdown" class="share-dropdown hidden">
          <button id="share-play" class="share-option">Share Play Link</button>
          <button id="share-watch" class="share-option">Share Watch Link</button>
        </div>
      </div>
      <button id="toolbar-leave">Leave</button>
      <div id="more-wrapper">
        <button id="toolbar-more" class="toolbar-toggle" title="More options">&#x22EF;</button>
        <div id="more-dropdown" class="more-dropdown hidden">
          <button id="toolbar-info" class="more-option">Info</button>
          <button id="toolbar-remap" class="more-option">Remap</button>
          <button id="toolbar-end" class="more-option more-end">End Game</button>
        </div>
      </div>
    </div>

    <script>
      window.KNState = { touchInput: {} };
      for (let i = 0; i < 24; i++) window.KNState.touchInput[i] = 0;
    </script>
    <script src="/static/virtual-gamepad.js"></script>
    <script>
      VirtualGamepad.init();
    </script>
  </body>
</html>
