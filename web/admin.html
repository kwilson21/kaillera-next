<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kaillera-next admin</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <div id="auth-prompt" class="card hidden">
      <h1>kaillera-next admin</h1>
      <input id="admin-key-input" type="password" placeholder="Admin key" autocomplete="off" />
      <button id="auth-btn">Authenticate</button>
      <p id="auth-error" class="error hidden">Invalid key</p>
    </div>

    <div id="admin-panel" class="hidden">
      <header>
        <h1><a href="/">kaillera-next</a> <span class="dim">admin</span></h1>
        <button id="refresh-btn" title="Refresh">Refresh</button>
      </header>

      <div class="stats-row" id="stats-row"></div>

      <div class="tab-bar">
        <button class="tab active" data-tab="logs">Session Logs</button>
        <button class="tab" data-tab="errors">Client Events</button>
        <button class="tab" data-tab="feedback">Feedback</button>
        <button class="tab" data-tab="desync">Desync Events</button>
      </div>

      <div class="log-section" id="tab-logs">
        <div class="log-header">
          <h2>Session Logs</h2>
          <div class="log-actions">
            <input
              id="session-search"
              type="text"
              placeholder="Search room code, player name, or match ID…"
              style="width: 320px; padding: 6px 10px"
            />
          </div>
        </div>
        <div id="session-log-list"></div>
        <p id="no-session-logs" class="dim hidden">No session logs found.</p>
      </div>

      <div class="log-section hidden" id="tab-errors">
        <div class="log-header">
          <h2>Client Events</h2>
          <div class="log-actions">
            <select id="error-type-filter">
              <option value="">All types</option>
              <option value="webrtc-fail">webrtc-fail</option>
              <option value="wasm-fail">wasm-fail</option>
              <option value="desync">desync</option>
              <option value="stall">stall</option>
              <option value="reconnect">reconnect</option>
              <option value="audio-fail">audio-fail</option>
              <option value="unhandled">unhandled</option>
              <option value="compat">compat</option>
              <option value="session-end">session-end</option>
              <option value="room_created">room_created</option>
              <option value="peer_joined">peer_joined</option>
              <option value="webrtc_connected">webrtc_connected</option>
              <option value="rom_loaded">rom_loaded</option>
              <option value="emulator_booted">emulator_booted</option>
              <option value="first_frame_rendered">first_frame_rendered</option>
              <option value="milestone_reached">milestone_reached</option>
            </select>
          </div>
        </div>
        <div id="error-list"></div>
        <p id="no-errors" class="dim hidden">No client events found.</p>
      </div>

      <div class="log-section hidden" id="tab-feedback">
        <div class="log-header">
          <h2>Feedback</h2>
          <div class="log-actions">
            <select id="feedback-category-filter">
              <option value="">All categories</option>
              <option value="bug">Bug Reports</option>
              <option value="feature">Feature Requests</option>
              <option value="general">General</option>
            </select>
          </div>
        </div>
        <div id="feedback-list"></div>
        <p id="no-feedback" class="dim hidden">No feedback found.</p>
      </div>

      <div class="log-section hidden" id="tab-desync">
        <div class="log-header">
          <h2>Desync Events</h2>
          <div class="log-actions">
            <input id="desync-match-id" type="text" placeholder="match_id…" style="width: 360px; padding: 6px 10px" />
            <button id="desync-load-btn">Load</button>
          </div>
        </div>
        <ul id="desync-event-list" style="list-style: none; padding: 0; font-family: monospace; font-size: 13px"></ul>
        <p id="no-desync-events" class="dim hidden">No desync events for this match.</p>
      </div>

      <div id="log-viewer" class="hidden">
        <div class="viewer-header">
          <div>
            <h3 id="viewer-title"></h3>
            <div id="viewer-meta" class="viewer-meta"></div>
          </div>
          <div class="viewer-actions">
            <button id="viewer-copy" title="Copy log content">Copy</button>
            <button id="viewer-close">Close</button>
          </div>
        </div>
        <div id="viewer-extras"></div>
        <pre id="viewer-content"></pre>
      </div>
    </div>

    <script src="/static/storage.js"></script>
    <script src="/static/admin.js"></script>
  </body>
</html>
