    <script>
      (() => {
        const code = document.body.dataset.errorCode;
        document.title = `Error ${code} — kaillera-next`;

        // Theme selection: ?theme=N override or random
        const params = new URLSearchParams(location.search);
        const override = parseInt(params.get('theme'), 10);
        const themeIndex = override >= 1 && override <= 4 ? override : Math.floor(Math.random() * 4) + 1;

        const tpl = document.getElementById(`theme-${themeIndex}`);
        if (tpl) {
          document.getElementById('root').appendChild(tpl.content.cloneNode(true));
        }

        // Replace all {{CODE}} placeholders in the activated theme
        document.getElementById('root').innerHTML = document
          .getElementById('root')
          .innerHTML.replaceAll('{{CODE}}', code);

        // Run theme-specific init if defined
        const initFn = window[`initTheme${themeIndex}`];
        if (typeof initFn === 'function') initFn(code);
      })();
    </script>

      <script>
        window.initTheme1 = (code) => {
          const pad = `00${code}00`.padStart(7, '0');
          document.getElementById('t1-score').textContent = pad;
          document.getElementById('t1-yourscore').textContent = pad;
          let count = 9;
          const el = document.getElementById('t1-countdown');
          const coin = document.getElementById('t1-coin');
          const timer = setInterval(() => {
            count--;
            if (count < 0) {
              clearInterval(timer);
              el.textContent = '0';
              el.style.color = '#f33';
              coin.textContent = 'RETURNING TO LOBBY...';
              coin.style.color = '#ff0';
              setTimeout(() => {
                window.location.href = '/';
              }, 1500);
              return;
            }
            el.textContent = count;
            if (count <= 3) el.style.color = '#f33';
          }, 1000);
        };

              <div class="t2-cart-slot"></div>
            </div>
            <div class="t2-blow">[ blow on it? ]</div>
          </div>
          <div class="t2-details">
            <div class="t2-title" id="t2-title">CARTRIDGE NOT FOUND</div>
            <div class="t2-sub">The page could not be read from memory</div>
            <a href="/" class="t2-btn" aria-label="Return to lobby">&gt; REBOOT SYSTEM _</a>
          </div>
        </div>
      </div>
      <script>
        window.initTheme2 = (code) => {
          const msgs = {
            404: ['CARTRIDGE NOT FOUND', 'CARTRIDGE NOT FOUND'],
            500: ['FATAL EXCEPTION: CORE DUMP', 'FATAL EXCEPTION'],
            429: ['BUFFER OVERFLOW: TOO MANY REQUESTS', 'BUFFER OVERFLOW'],
          };
          const m = msgs[code] || msgs['404'];
          const el = document.getElementById('t2-errmsg');
          if (el) el.textContent = 'FATAL EXCEPTION: ' + m[1];
          const t = document.getElementById('t2-title');
          if (t) t.textContent = m[1];
          // Static noise
          const c = document.getElementById('t2-noise');
          if (c) {
            const ctx = c.getContext('2d');
            c.width = window.innerWidth;
            c.height = window.innerHeight;
            const noise = () => {
              const d = ctx.createImageData(c.width, c.height);
              for (let i = 0; i < d.data.length; i += 4) {
                const v = Math.random() * 255;
                d.data[i] = d.data[i + 1] = d.data[i + 2] = v;
                d.data[i + 3] = 255;
              }
              ctx.putImageData(d, 0, 0);
              requestAnimationFrame(noise);
            };
            noise();
          }
          // Scramble hex
          const sc = document.getElementById('t2-scramble');
          if (sc)
            setInterval(() => {
              let s = '0x';
              for (let i = 0; i < 8; i++) s += '0123456789ABCDEF'[(Math.random() * 16) | 0];
              sc.textContent = s;
            }, 100);
        };
      </script>
    </template>
    <template id="theme-3"></template>
    <template id="theme-4"></template>
  </body>
</html>
