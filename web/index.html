<!doctype html>
<!-- kaillera-next: continuing the legacy of Kaillera (2001) by Christophe Thibault -->
<!-- v0.9 forever -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kaillera-next</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/lobby.css" />
  </head>
  <body>
    <main class="lobby-card">
      <h1 title="v0.9 forever">kaillera-next</h1>
      <label for="player-name" class="sr-only">Your name</label>
      <input id="player-name" placeholder="Your name" autocomplete="off" aria-label="Your name" />
      <button id="create-btn">Create Room</button>
      <div class="divider">or join a game</div>
      <div class="join-row">
        <label for="room-code" class="sr-only">Room code or invite link</label>
        <input
          id="room-code"
          placeholder="Room code or invite link"
          autocomplete="off"
          aria-label="Room code or invite link"
        />
        <button id="join-btn">Join</button>
        <button id="watch-btn">Watch</button>
      </div>
    </main>
    <p style="padding: 24px 0 12px; font-size: 12px; color: #555; text-align: center">
      by Kazon Wilson (Agent 21) &middot; Inspired by Kaillera by Christophe Thibault
      <br />
      <a
        href="https://github.com/kwilson21/kaillera-next"
        target="_blank"
        rel="noopener"
        class="footer-link"
        title="View on GitHub"
      >
        <svg
          class="footer-icon"
          viewBox="0 0 24 24"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"

        GitHub

      &middot;
      <a
        href="https://ko-fi.com/kazonwilson"
        target="_blank"
        rel="noopener"
        class="footer-link"
        title="Support on Ko-fi"
      >
        <svg class="footer-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            d="M5 12V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v5a5 5 0 0 1-5 5H10a5 5 0 0 1-5-5Z"
            stroke="currentColor"
            stroke-width="1.5"
          />
          <path
            d="M17 7h1.5A2.5 2.5 0 0 1 21 9.5v0a2.5 2.5 0 0 1-2.5 2.5H17"

          />

        Support

      &middot;
      <span
        id="kn-about"
        class="footer-link"
        style="cursor: pointer"
        title="About kaillera-next"
        role="button"
        tabindex="0"
        aria-label="About kaillera-next"
        >About</span
      >
      &middot;
      <span
        id="kn-version"
        class="footer-link"
        style="cursor: pointer"
        title="View changelog"
        role="button"
        tabindex="0"
        aria-label="View changelog"
      ></span>
    </p>
    <script src="/static/storage.js"></script>
    <script src="/static/version.js"></script>
    <script src="/static/lobby.js"></script>
  </body>
</html>
