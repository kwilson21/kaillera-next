<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>kaillera-next</title>
  <link rel="stylesheet" href="/static/play.css">
</head>
<body>
  <!-- Pre-game overlay -->
  <div id="overlay" class="hidden">
    <div class="overlay-card">
      <h2>Room: <span id="room-display"></span></h2>
      <button id="copy-link">Copy Invite Link</button>

      <div id="player-list">
        <div class="player-slot" data-slot="0">
          <span class="slot-num">P1</span>
          <span class="name empty">Open</span>
          <span class="gamepad"></span>
        </div>
        <div class="player-slot" data-slot="1">
          <span class="slot-num">P2</span>
          <span class="name empty">Open</span>
          <span class="gamepad"></span>
        </div>
        <div class="player-slot" data-slot="2">
          <span class="slot-num">P3</span>
          <span class="name empty">Open</span>
          <span class="gamepad"></span>
        </div>
        <div class="player-slot" data-slot="3">
          <span class="slot-num">P4</span>
          <span class="name empty">Open</span>
          <span class="gamepad"></span>
        </div>
      </div>

      <div id="spectator-list"></div>

      <div id="rom-drop" class="rom-drop">
        <p>Drop your ROM file here</p>
        <p class="rom-hint">.z64 / .n64 / .v64</p>
        <p id="rom-status" class="rom-status"></p>
      </div>

      <div id="host-controls" style="display:none">
        <label for="mode-select" class="mode-label">Mode:</label>
        <select id="mode-select" title="Lockstep: all players run the emulator in sync. Streaming: host runs the emulator, guests watch a video stream.">
          <option value="lockstep" title="All players run the emulator in perfect sync — best quality, requires good connection">Lockstep</option>
          <option value="streaming" title="Host runs the emulator and streams video to guests — zero desync, works on weaker devices">Streaming</option>
        </select>
        <div id="lockstep-options">
          <label><input type="checkbox" id="opt-rollback"> Rollback <span class="opt-hint">(experimental resync)</span></label>
        </div>
        <button id="start-btn" disabled>Start Game (need 2+)</button>
      </div>

      <p id="guest-status" style="display:none">Waiting for host to start...</p>

      <div id="gamepad-status">No controller detected</div>
      <div id="engine-status"></div>

      <button id="leave-btn">Leave</button>
    </div>
  </div>

  <!-- In-game toolbar -->
  <div id="toolbar" class="hidden">
    <span id="toolbar-room"></span>
    <div class="toolbar-spacer"></div>
    <button id="toolbar-leave">Leave Game</button>
    <button id="toolbar-end" style="display:none">End Game</button>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container"></div>

  <!-- Error overlay -->
  <div id="error-msg" class="hidden">
    <div class="error-card"></div>
  </div>

  <!-- Core redirector: overrides EJS_pathtodata for lockstep mode -->
  <script src="/static/core-redirector.js"></script>

  <!-- EmulatorJS — ROM supplied by user drag-and-drop -->
  <div id="game"></div>
  <script>
    var EJS_player     = '#game';
    var EJS_core       = 'n64';
    // EJS_gameUrl set by play.js when user drops a ROM file
    var EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
  </script>
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- Netplay engine (selected by mode URL param) -->
  <script>
    var _mode = new URLSearchParams(window.location.search).get('mode') || 'lockstep';
    var _src = _mode === 'streaming'
      ? '/static/netplay-streaming.js'
      : '/static/netplay-lockstep.js';
    document.write('<script src="' + _src + '"><\/script>');
  </script>

  <!-- Play page controller -->
  <script src="/static/play.js"></script>
</body>
</html>
